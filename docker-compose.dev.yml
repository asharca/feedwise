services:
  feedwise-db:
    image: postgres:16-alpine
    container_name: feedwise-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: feedwise
      POSTGRES_PASSWORD: feedwise
      POSTGRES_DB: feedwise
    ports:
      - "5433:5432"
    volumes:
      - feedwise-db-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  feedwise-redis:
    image: redis:7-alpine
    container_name: feedwise-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  feedwise-db-dev:
